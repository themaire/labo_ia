services:

  # ── Flask / Gunicorn ────────────────────────────────────────────────────────
  web:
    build: .
    image: labo_ia:latest
    container_name: labo_ia_web
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # PostgreSQL connection (override with a real .env file or secrets)
      POSTGRES_HOST:     ${POSTGRES_HOST:-db}
      POSTGRES_USER:     ${POSTGRES_USER:-labo_ia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-labo_ia}
      POSTGRES_SCHEMA:   ${POSTGRES_SCHEMA:-ollama}
    volumes:
      # Persist uploaded images across container restarts
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - labo_net

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: labo_ia_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-labo_ia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-labo_ia}
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Place any *.sql init scripts in ./initdb/ to auto-run on first start
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-labo_ia}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - labo_net

volumes:
  pg_data:
  uploads_data:

networks:
  labo_net:
    driver: bridge
